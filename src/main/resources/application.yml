spring:
  application:
    name: therapist-api

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:${POSTGRES_PORT:5433}}/${DB_NAME:${POSTGRES_DB:therapist_api}}
    username: ${DB_USERNAME:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:${RABBITMQ_AMQP_PORT:5672}}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    accesslog:
      enabled: true
      # %D = processing time in ms, %s = HTTP status, %r = first request line.
      pattern: '%h %l %u %t "%r" %s %b %D'

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.security: INFO

jwt:
  public-key: ${JWT_PUBLIC_KEY:}
  signing-kid: ${JWT_SIGNING_KID:}
  issuer: ${JWT_ISSUER:mhsa-auth}
  audience: ${JWT_AUDIENCE:mhsa-api}

zoom:
  app-key: ${ZOOM_APP_KEY:}
  app-secret: ${ZOOM_APP_SECRET:}
